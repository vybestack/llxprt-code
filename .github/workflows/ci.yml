# .github/workflows/ci.yml

name: 'LLxprt Code CI'

on:
  push:
    branches:
      - 'main'
      - 'release/**'
  pull_request:
    branches:
      - 'main'
      - 'release/**'
  merge_group:
  workflow_dispatch:
    # Manual trigger - no inputs needed, uses repository variables

permissions:
  checks: 'write'
  contents: 'read'
  statuses: 'write'

defaults:
  run:
    shell: 'bash'

env:
  ACTIONLINT_VERSION: '1.7.7'
  SHELLCHECK_VERSION: '0.11.0'
  YAMLLINT_VERSION: '1.35.1'
jobs:
  skip_check:
    name: 'Skip Duplicate Check'
    runs-on: 'ubuntu-latest'
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
      paths_result: ${{ steps.skip_check.outputs.paths_result }}
    steps:
      - id: skip_check
        # ratchet:fkirc/skip-duplicate-actions@v5.3.1
        uses: 'fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf'
        with:
          concurrent_skipping: 'same_content'
          skip_after_successful_duplicate: 'true'
          do_not_skip: '["workflow_dispatch", "merge_group"]'
  doc_change_filter:
    name: 'Detect doc-only changes'
    runs-on: 'ubuntu-latest'
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    env:
      GH_TOKEN: '${{ github.token }}'
    outputs:
      docs_only: '${{ steps.detect.outputs.docs_only }}'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 'Determine documentation-only PR'
        id: 'detect'
        env:
          PR_NUMBER: >-
            ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail
          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "docs_only=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(gh api \
            --paginate \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename' || true)"

          if [[ -z "$files" ]]; then
            echo "docs_only=false" >>"$GITHUB_OUTPUT"
            {
              echo "### Unable to determine doc-only status"
              echo "GitHub API returned no files; running full CI to be safe."
            } >>"$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          gitignore_patch=''
          if grep -Fxq '.gitignore' <<<"$files"; then
            gitignore_patch="$(gh api \
              --paginate \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
              --jq '.[] | select(.filename == ".gitignore") | .patch' || true)"
          fi

          docs_only=true
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              docs/*|README.md|README.*|CHANGELOG.md|CHANGELOG.*)
                ;;
              CONTRIBUTING.md|CONTRIBUTING.*|CODE_OF_CONDUCT.md|SECURITY.md)
                ;;
              *.md|*.mdx|*.rst|*.txt|*.adoc)
                ;;
              .gitignore)
                if [[ -z "$gitignore_patch" ]]; then
                  docs_only=false
                  break
                fi
                if printf '%s\n' "$gitignore_patch" \
                  | grep -E '^[+-][^+-]' \
                  | grep -Ev '^[+-](!docs/reference/|#.*docs/reference)' >/dev/null; then
                  docs_only=false
                  break
                fi
                ;;
              *)
                docs_only=false
                break
                ;;
            esac
          done <<<"$files"

          echo "docs_only=${docs_only}" >>"$GITHUB_OUTPUT"
          if [[ "$docs_only" == "true" ]]; then
            {
              echo "### Documentation-only PR detected"
              echo "Skipping automated test suites (unit + coverage) for this PR."
            } >>"$GITHUB_STEP_SUMMARY"
          fi
  #
  # Lint: GitHub Actions
  #
  lint_github_actions:
    name: 'Lint (GitHub Actions)'
    runs-on: 'ubuntu-latest'
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 'Install shellcheck' # Actionlint uses shellcheck
        run: |-
          mkdir -p "${RUNNER_TEMP}/shellcheck"
          curl -sSLo "${RUNNER_TEMP}/.shellcheck.txz" "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          tar -xf "${RUNNER_TEMP}/.shellcheck.txz" -C "${RUNNER_TEMP}/shellcheck" --strip-components=1
          echo "${RUNNER_TEMP}/shellcheck" >> "${GITHUB_PATH}"

      - name: 'Install actionlint'
        run: |-
          mkdir -p "${RUNNER_TEMP}/actionlint"
          curl -sSLo "${RUNNER_TEMP}/.actionlint.tgz" "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/.actionlint.tgz" -C "${RUNNER_TEMP}/actionlint"
          echo "${RUNNER_TEMP}/actionlint" >> "${GITHUB_PATH}"

      # For actionlint, we specifically ignore shellcheck rules that are
      # annoying or unhelpful. See the shellcheck action for a description.
      - name: 'Run actionlint'
        run: |-
          actionlint \
            -color \
            -format "{{range \$err := .}}::error file={{\$err.Filepath}},line={{\$err.Line}},col={{\$err.Column}}::{{\$err.Filepath}}@{{\$err.Line}} {{\$err.Message}}%0A\`\`\`%0A{{replace \$err.Snippet \"\\\\n\" \"%0A\"}}%0A\`\`\`\\n{{end}}" \
            -ignore 'SC2002:' \
            -ignore 'SC2016:info' \
            -ignore 'SC2129:' \
            -ignore 'label ".+" is unknown'

      - name: 'Run ratchet'
        uses: 'sethvargo/ratchet@8b4ca256dbed184350608a3023620f267f0a5253' # ratchet:sethvargo/ratchet@v0.11.4
        with:
          files: |-
            .github/workflows/*.yml
            .github/actions/**/*.yml

  #
  # Lint: Javascript
  #
  # Stays on npm (not Bun) for S6 (#2243): the type-aware ESLint config
  # (`projectService` in eslint.config.js) deterministically degrades under
  # Bun's hoisted node_modules on the CI runner (Linux + Node 20), emitting
  # hundreds of spurious `any` errors that do not reproduce locally or under
  # npm. Revisit once the Bun hoisting/type-resolution interaction is resolved.
  lint_javascript:
    name: 'Lint (Javascript)'
    runs-on: 'ubuntu-latest'
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Run lockfile check'
        run: |-
          npm run check:lockfile

      - name: 'Install dependencies'
        run: |-
          npm ci

      - name: Fix rollup platform dependency
        run: |
          # Explicitly install the platform-specific rollup package
          # This is a workaround for https://github.com/npm/cli/issues/4828
          if [ "${{ runner.os }}" == "Linux" ]; then
            npm install @rollup/rollup-linux-x64-gnu --no-save || true
          elif [ "${{ runner.os }}" == "Windows" ]; then
            npm install @rollup/rollup-win32-x64-msvc --no-save || true
          fi
        shell: bash

      - name: 'Run formatter check'
        run: |-
          npm run format
          # Check for changes, excluding project-plans directory
          git diff --exit-code -- . ':!project-plans/'

      - name: 'Run ESLint policy guard'
        env:
          ESLINT_GUARD_BASE: >-
            ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha
              || github.event_name == 'merge_group' && github.event.merge_group.base_sha
              || github.event_name == 'push' && github.event.before
              || 'origin/main' }}
          ESLINT_GUARD_HEAD: ${{ github.sha }}
        run: |-
          npm run lint:eslint-guard

      - name: 'Run CLI import-boundary guard'
        run: |-
          npm run lint:cli-boundary

      - name: 'Run linter'
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |-
          npm run lint:ci

      - name: 'Run LSP package linter'
        run: |-
          cd packages/lsp && npx eslint .

      - name: 'Run linter on integration tests'
        run: |-
          npx eslint integration-tests

      - name: 'Run formatter on integration tests'
        run: |-
          npx prettier --check integration-tests
          git diff --exit-code

      - name: 'Build project'
        run: |-
          npm run build

      - name: Create bundle
        run: npm run bundle

      - name: 'Run type check'
        run: |-
          npm run typecheck

      - name: 'Run sensitive keyword linter'
        run: 'node scripts/lint.js --sensitive-keywords'

  #
  # Lint: Shell
  #
  lint_shell:
    name: 'Lint (Shell)'
    runs-on: 'ubuntu-latest'
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 'Install shellcheck'
        run: |-
          mkdir -p "${RUNNER_TEMP}/shellcheck"
          curl -sSLo "${RUNNER_TEMP}/.shellcheck.txz" "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          tar -xf "${RUNNER_TEMP}/.shellcheck.txz" -C "${RUNNER_TEMP}/shellcheck" --strip-components=1
          echo "${RUNNER_TEMP}/shellcheck" >> "${GITHUB_PATH}"

      - name: 'Install shellcheck problem matcher'
        run: |-
          cat > "${RUNNER_TEMP}/shellcheck/problem-matcher-lint-shell.json" <<"EOF"
          {
            "problemMatcher": [
              {
                "owner": "lint_shell",
                "pattern": [
                  {
                    "regexp": "^(.*):(\\\\d+):(\\\\d+):\\\\s+(?:fatal\\\\s+)?(warning|error):\\\\s+(.*)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          EOF
          echo "::add-matcher::${RUNNER_TEMP}/shellcheck/problem-matcher-lint-shell.json"

      # Note that only warning and error severity show up in the github files
      # page. So we replace 'style' and 'note' with 'warning' to make it show
      # up.
      #
      # We also try and find all bash scripts even if they don't have an
      # explicit extension.
      #
      # We explicitly ignore the following rules:
      #
      # - SC2002: This rule suggests using "cmd < file" instead of "cat | cmd".
      #   While < is more efficient, pipes are much more readable and expected.
      #
      # - SC2129: This rule suggests grouping multiple writes to a file in
      #   braces like "{ cmd1; cmd2; } >> file". This is unexpected and less
      #   readable.
      #
      # - SC2310: This is an optional warning that only appears with "set -e"
      #   and when a command is used as a conditional.
      - name: 'Run shellcheck'
        run: |-
          git ls-files | grep -E '^([^.]+|.*\.(sh|zsh|bash))$' | xargs file --mime-type \
            | grep "text/x-shellscript" | awk '{ print substr($1, 1, length($1)-1) }' \
            | xargs shellcheck \
              --check-sourced \
              --enable=all \
              --exclude=SC2002,SC2129,SC2310,SC2311,SC2312 \
              --severity=style \
              --format=gcc \
              --color=never | sed -e 's/note:/warning:/g' -e 's/style:/warning:/g'

  #
  # Lint: YAML
  #
  lint_yaml:
    name: 'Lint (YAML)'
    runs-on: 'ubuntu-latest'
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 'Setup Python'
        uses: 'actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065' # ratchet:actions/setup-python@v5
        with:
          python-version: '3'

      - name: 'Install yamllint'
        run: |-
          pip install --user "yamllint==${YAMLLINT_VERSION}"

      - name: 'Run yamllint'
        run: |-
          git ls-files | grep -E '\.(yaml|yml)' | xargs yamllint --format github

  #
  # Lint: All
  #
  # This is a virtual job that other jobs depend on to wait for all linters to
  # finish. It's also used to ensure linting happens on CI via required
  # workflows.
  lint:
    name: 'Lint'
    needs:
      - 'lint_github_actions'
      - 'lint_javascript'
      - 'lint_shell'
      - 'lint_yaml'
      # Gates the expensive test matrix behind a cheap npm build+bundle+smoke
      # so a broken build fails fast on ubuntu instead of on every matrix leg.
      - 'node_consumer_smoke'
    runs-on: 'ubuntu-latest'
    steps:
      - run: |-
          echo 'All linters finished!'

  #
  # Bun: Workspace install smoke
  #
  # Verifies the S1 acceptance criterion that `bun install` succeeds from a
  # clean checkout and wires up every workspace package. Uses a plain
  # `bun install` rather than `--frozen-lockfile`: Bun re-normalizes this
  # monorepo's lockfile on every pass (see dev-docs/bun.md), so a frozen check
  # would be perpetually red despite a valid, deterministically generated
  # lockfile. Pinning via .bun-version keeps the toolchain reproducible.
  bun_install_smoke:
    name: 'Bun Install Smoke'
    runs-on: 'ubuntu-latest'
    # A monorepo smoke install completes in well under a minute; cap the job so a
    # hung `bun install` (registry stall or workspace-resolution deadlock) fails
    # fast instead of occupying a runner up to the 6-hour GitHub Actions default.
    timeout-minutes: 15
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          # This job runs `bun install`, which executes the lifecycle scripts of
          # trusted native dependencies. It performs no authenticated git
          # operation after checkout, so the default credential persistence only
          # widens the token's exposure to those install-time scripts. Drop it.
          persist-credentials: false

      - name: 'Setup Bun'
        uses: 'oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76' # ratchet:oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: 'Install workspaces with Bun'
        run: |-
          bun install

      - name: 'Verify Bun linked every declared local workspace package'
        # Runs the committed verifier (also runnable locally via
        # `bun install && node scripts/verify-bun-workspace-links.mjs`) so the
        # link-check logic lives in one tested place instead of an inline
        # heredoc. Executed with `bun` — already set up for this job — to avoid
        # relying on an implicitly-provided Node on the runner.
        run: |-
          bun scripts/verify-bun-workspace-links.mjs

  #
  # Bun: Native-module smoke (issue 2239, S2)
  #
  # Verifies that the native modules the CLI depends on load and operate under
  # the Bun runtime on POSIX: @ast-grep/napi, @napi-rs/keyring (construct-only),
  # web-tree-sitter + tree-sitter-bash WASM, and the Bun.Terminal PTY adapter
  # (the bun-pty seam). Does NOT weaken existing checks — it is an additive job.
  bun_native_modules_smoke:
    name: 'Bun Native Modules Smoke'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    permissions:
      contents: 'read'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          persist-credentials: false

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Setup Bun'
        uses: 'oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76' # ratchet:oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: 'Install dependencies'
        run: |-
          npm ci

      - name: 'Run Bun native-module smoke harness'
        run: |-
          bun scripts/bun-native-modules-smoke.mjs

  #
  # Node consumer smoke (issue 2243, S6)
  #
  # Guards published-package Node compatibility on a pure npm/Node path (no
  # Bun), representing an external Node consumer: install, build, bundle, then
  # run the produced bundle under `node`. Wired into the `lint` aggregator so
  # the expensive test matrix waits for this fast build+smoke check first.
  node_consumer_smoke:
    name: 'Node Consumer Smoke'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    # This job runs npm ci (executing third-party install scripts) and only
    # needs to read the repo, so scope permissions to contents:read and drop
    # credential persistence (matches bun_native_modules_smoke hardening).
    permissions:
      contents: 'read'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: |-
          npm ci

      - name: 'Fix rollup platform dependency'
        run: |-
          # Explicitly install the platform-specific rollup package
          # This is a workaround for https://github.com/npm/cli/issues/4828
          if [ "${{ runner.os }}" == "Linux" ]; then
            npm install @rollup/rollup-linux-x64-gnu --no-save || true
          elif [ "${{ runner.os }}" == "Windows" ]; then
            npm install @rollup/rollup-win32-x64-msvc --no-save || true
          fi
        shell: 'bash'

      - name: 'Build project'
        run: |-
          npm run build

      - name: 'Create bundle'
        run: |-
          npm run bundle

      - name: 'Smoke test bundle'
        run: 'node ./bundle/llxprt.js --version'

  #
  # Test: Node (Linux and macOS - always run)
  #
  # Stays on npm (not Bun) for S6 (#2243): Bun's hoisted linker non-
  # deterministically materializes incomplete copies of third-party packages
  # (e.g. uuid, yargs, ajv) whose package.json entry points at files that the
  # copy is missing, breaking esbuild's bundle resolution and vitest's import
  # resolution. The workspace-shadow subset is dedupe-able, but version-conflict
  # copies (e.g. ajv@8.18.0 vs root 8.20.0) cannot be safely removed. Revisit
  # once Bun's hoisted linker materializes complete packages.
  #
  # setup-bun is still installed here (pinned via .bun-version) because the LSP
  # service client (ide-integration/src/lsp/lsp-service-client.ts) resolves `bun`
  # through `which` and disables the LSP/MCP service when bun is absent from
  # PATH, which fails the config-lsp-integration and e2e-lsp tests. Pinning to
  # .bun-version reconciles the CI toolchain with dev-docs/bun.md and replaces
  # the floating 'latest' that previously triggered a Zizmor cache-poisoning
  # warning.
  test:
    name: 'Test (${{ matrix.os }}, ${{ matrix.secure-store-mode }})'
    runs-on: '${{ matrix.os }}'
    needs:
      - 'lint'
      - 'doc_change_filter'
      - 'skip_check'
    if: ${{ needs.doc_change_filter.outputs.docs_only != 'true' && needs.skip_check.outputs.should_skip != 'true' }}
    permissions:
      contents: 'read'
      checks: 'write'
      pull-requests: 'write'
    strategy:
      fail-fast: false # So we can see all test failures
      matrix:
        os:
          - 'ubuntu-latest'
          - 'macos-latest'
        node-version:
          - '24.x'
        secure-store-mode:
          - 'keyring'
          - 'fallback'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Set up Node.js ${{ matrix.node-version }}'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version: '${{ matrix.node-version }}'
          cache: 'npm'

      - name: 'Setup Bun'
        uses: 'oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76' # ratchet:oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: 'Install dependencies for testing'
        run: |-
          npm ci
      - name: 'Build project'
        run: |-
          npm run build

      - name: 'Create bundle'
        run: |-
          npm run bundle

      - name: 'Fix rollup platform dependency'
        run: |-
          # Explicitly install the platform-specific rollup package
          # This is a workaround for https://github.com/npm/cli/issues/4828
          if [ "${{ runner.os }}" == "Linux" ]; then
            npm install @rollup/rollup-linux-x64-gnu --no-save || true
          elif [ "${{ runner.os }}" == "Windows" ]; then
            npm install @rollup/rollup-win32-x64-msvc --no-save || true
          fi
        shell: 'bash'

      - name: 'Limit Vitest forks on Windows'
        if: runner.os == 'Windows'
        run: |
          echo "VITEST_MAX_FORKS=2" >> "$GITHUB_ENV"
          echo "VITEST_MIN_FORKS=1" >> "$GITHUB_ENV"
          echo "VITEST_TEST_TIMEOUT=30000" >> "$GITHUB_ENV"
          echo "VITEST_POOL_TIMEOUT=60000" >> "$GITHUB_ENV"

      - name: 'Run tests and generate reports'
        env:
          # Provider configuration from repository secrets/variables
          OPENAI_API_KEY: ${{ secrets[vars.KEY_VAR_NAME] }}
          OPENAI_API_KEY_2: ${{ secrets[vars.KEY_VAR_NAME_2] }}
          KEY_VAR_NAME: ${{ vars.KEY_VAR_NAME }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          LLXPRT_DEFAULT_MODEL: ${{ vars.LLXPRT_DEFAULT_MODEL }}
          LLXPRT_DEFAULT_PROVIDER: ${{ vars.LLXPRT_DEFAULT_PROVIDER }}
          # Set auth type to provider for API key authentication
          LLXPRT_AUTH_TYPE: provider
          NO_COLOR: true
          # Ensure OAuth tests are skipped in CI (they require browser interaction)
          CI: true
          # Allow OpenAI integration tests to exceed Vitest's 5s default timeout (issue #338)
          VITEST_TEST_TIMEOUT: 15000
          # Force SecureStore to use encrypted-file fallback instead of keyring (R15.2)
          LLXPRT_SECURE_STORE_FORCE_FALLBACK: ${{ matrix.secure-store-mode == 'fallback' && 'true' || '' }}
        run: 'npm run test'

      - name: 'Run script harness tests (macOS)'
        if: matrix.os == 'macos-latest'
        env:
          CI: true
        run: npm run test:scripts

      - name: 'Smoke test bundle'
        run: 'node ./bundle/llxprt.js --version'

      - name: 'Wait for file system sync'
        run: 'sleep 2'

      - name: 'Publish Test Report (for non-forks)'
        if: |-
          ${{ always() && (github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: 'dorny/test-reporter@dc3a92680fcc15842eef52e8c4606ea7ce6bd3f3' # ratchet:dorny/test-reporter@v2
        with:
          name: 'Test Results (Node ${{ matrix.node-version }})'
          path: 'packages/*/junit.xml'
          reporter: 'java-junit'
          fail-on-error: 'false'

      - name: 'Upload Test Results Artifact (for forks)'
        if: |-
          ${{ always() && (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # ratchet:actions/upload-artifact@v4
        with:
          name: 'test-results-fork-${{ matrix.node-version }}-${{ matrix.os }}-${{ matrix.secure-store-mode }}'
          path: 'packages/*/junit.xml'

      - name: 'Upload coverage reports'
        if: |-
          ${{ always() }}
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # ratchet:actions/upload-artifact@v4
        with:
          name: 'coverage-reports-${{ matrix.node-version }}-${{ matrix.os }}-${{ matrix.secure-store-mode }}'
          path: 'packages/*/coverage'

  post_coverage_comment:
    name: 'Post Coverage Comment'
    runs-on: 'ubuntu-latest'
    needs: ['test', 'doc_change_filter']
    if: |-
      ${{ always() && needs.test.result == 'success' && github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name == github.repository) }}
    continue-on-error: true
    permissions:
      contents: 'read' # For checkout
      pull-requests: 'write' # For commenting
    strategy:
      matrix:
        # Reduce noise by only posting the comment once
        os:
          - 'ubuntu-latest'
        node-version:
          - '24.x'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Download coverage reports artifact'
        uses: 'actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0' # ratchet:actions/download-artifact@v5
        with:
          name: 'coverage-reports-${{ matrix.node-version }}-${{ matrix.os }}-keyring'
          path: 'coverage_artifact' # Download to a specific directory

      - name: 'Post Coverage Comment using Composite Action'
        uses: './.github/actions/post-coverage-comment' # Path to the composite action directory
        with:
          cli_json_file: 'coverage_artifact/cli/coverage/coverage-summary.json'
          core_json_file: 'coverage_artifact/core/coverage/coverage-summary.json'
          cli_full_text_summary_file: 'coverage_artifact/cli/coverage/full-text-summary.txt'
          core_full_text_summary_file: 'coverage_artifact/core/coverage/full-text-summary.txt'
          node_version: '${{ matrix.node-version }}'
          os: '${{ matrix.os }}'
          github_token: '${{ secrets.GITHUB_TOKEN }}'

  codeql:
    name: 'CodeQL'
    runs-on: 'ubuntu-latest'
    needs:
      - 'skip_check'
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    permissions:
      actions: 'read'
      contents: 'read'
      security-events: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Initialize CodeQL'
        uses: 'github/codeql-action/init@df559355d593797519d70b90fc8edd5db049e7a2' # ratchet:github/codeql-action/init@v3
        with:
          languages: 'javascript'

      - name: 'Perform CodeQL Analysis'
        uses: 'github/codeql-action/analyze@df559355d593797519d70b90fc8edd5db049e7a2' # ratchet:github/codeql-action/analyze@v3
