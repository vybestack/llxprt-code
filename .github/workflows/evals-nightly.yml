name: Evals Nightly

on:
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC daily
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  evals:
    name: Run Evals (Attempt ${{ matrix.run_attempt }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run_attempt: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # ratchet:actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # ratchet:actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create logs directory
        run: mkdir -p evals/logs

      - name: Run all evals
        env:
          OPENAI_API_KEY: '${{ secrets[vars.KEY_VAR_NAME] }}'
          LLXPRT_DEFAULT_PROVIDER: '${{ vars.LLXPRT_DEFAULT_PROVIDER }}'
          RUN_EVALS: '1'
        run: npm run test:all_evals

      - name: Upload eval logs
        if: always()
        uses: actions/upload-artifact@ea0f049d75fb3ce01f6f6e8e8b4d7c0b81059256 # ratchet:actions/upload-artifact@v4
        with:
          name: eval-logs-${{ matrix.run_attempt }}
          path: evals/logs
          retention-days: 7

  aggregate-results:
    name: Aggregate Results
    needs: [evals]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # ratchet:actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # ratchet:actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all artifacts
        uses: actions/download-artifact@b4c6125a4be4c0faaf4b94f8a41eae1b37f68453 # ratchet:actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate and output results
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: node scripts/aggregate_evals.js artifacts >> "$GITHUB_STEP_SUMMARY"
