name: Evals Nightly

on:
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC daily
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  evals:
    name: Run Evals (Attempt ${{ matrix.run_attempt }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run_attempt: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # ratchet:actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create logs directory
        run: mkdir -p evals/logs

      - name: Run all evals
        env:
          OPENAI_API_KEY: '${{ secrets[vars.KEY_VAR_NAME] }}'
          LLXPRT_DEFAULT_PROVIDER: '${{ vars.LLXPRT_DEFAULT_PROVIDER }}'
          RUN_EVALS: '1'
        run: npm run test:all_evals

      - name: Upload eval logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: eval-logs-${{ matrix.run_attempt }}
          path: evals/logs
          retention-days: 7

  aggregate-results:
    name: Aggregate Results
    needs: [evals]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # ratchet:actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # ratchet:actions/download-artifact@v5
        with:
          path: artifacts

      - name: Aggregate and output results
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: node scripts/aggregate_evals.js artifacts >> "$GITHUB_STEP_SUMMARY"
